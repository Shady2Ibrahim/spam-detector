<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamShield - Email Spam Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --danger: #ef4444;
            --success: #10b981;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #f9fafb;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #f0f4ff 0%, #f9f9f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            animation: fadeIn 0.6s ease-out;
            transition: all 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .logo i {
            font-size: 32px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 16px;
            font-weight: 400;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }
        
        .email-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 150px;
        }
        
        .email-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .email-input::placeholder {
            color: #9ca3af;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            margin-bottom: 24px;
        }
        
        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result-container {
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        
        .result-container.show {
            opacity: 1;
            height: auto;
            padding: 24px;
        }
        
        .result-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .result-description {
            color: var(--text-light);
            font-size: 15px;
        }
        
        .spam {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .not-spam {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }
            
            .logo {
                font-size: 24px;
            }
            
            .email-input {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <span>SpamShield</span>
            </div>
            <p class="subtitle">Detect spam emails with AI-powered accuracy</p>
        </div>
        
        <div class="input-group">
            <label for="email">Email Content</label>
            <textarea id="email" class="email-input" placeholder="Paste the email content you want to check here..."></textarea>
        </div>
        
        <button id="check-btn" class="btn">
            <i class="fas fa-search"></i>
            Check for Spam
        </button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Analyzing email content...</p>
        </div>
        
        <div id="result-container" class="result-container">
            <h3 id="result-title" class="result-title">
                <i id="result-icon"></i>
                <span id="result-text"></span>
            </h3>
            <p id="result-description" class="result-description"></p>
        </div>
    </div>

document.getElementById('check-btn').addEventListener('click', function() {
    const emailContent = document.getElementById('email').value.trim();
    const loadingElement = document.getElementById('loading');
    const resultContainer = document.getElementById('result-container');
    
    if (!emailContent) {
        alert('Please enter some email content to check');
        return;
    }
    
    // Show loading
    loadingElement.classList.add('show');
    resultContainer.classList.remove('show');
    
    // استدعاء API الحقيقي باستخدام fetch
    fetch('/predict', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({ email: emailContent })
    })
    .then(response => response.json())
    .then(data => {
        // Hide loading
        loadingElement.classList.remove('show');
        
        // الآن بتحدد النتيجة من الـ API
        const resultText = document.getElementById('result-text');
        const resultIcon = document.getElementById('result-icon');
        const resultDesc = document.getElementById('result-description');

        if (data.result === 'spam') {
            resultContainer.className = 'result-container spam show';
            resultText.textContent = 'Spam Detected';
            resultIcon.className = 'fas fa-exclamation-triangle';
            resultDesc.textContent = 'This email exhibits characteristics commonly found in spam messages.';
        } else {
            resultContainer.className = 'result-container not-spam show';
            resultText.textContent = 'Not Spam';
            resultIcon.className = 'fas fa-check-circle';
            resultDesc.textContent = 'This email appears to be legitimate and safe.';
        }
    })
    .catch(error => {
        loadingElement.classList.remove('show');
        console.error('Error:', error);
        alert('There was an error checking the email. Please try again.');
    });
});


</script>
